<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodHub - Đặt Thức Ăn Nhanh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00b14f;
            --text-color: #1c1c1c;
            --bg-color: #f7f7f7;
            --white: #ffffff;
            --gray: #9a9a9a;
            --light-gray: #eee;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background-color: var(--white);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8%;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .search-bar {
            flex: 0 1 500px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            background-color: var(--bg-color);
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .search-bar input:focus {
            border-color: var(--primary-color);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(0, 177, 79, 0.1);
        }

        .search-bar i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
        }

        .cart-icon {
            position: relative;
            font-size: 22px;
            color: var(--text-color);
            cursor: pointer;
            padding: 5px;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #ff4d4f;
            color: var(--white);
            font-size: 11px;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 992px) {
            .container {
                grid-template-columns: 1fr 380px;
            }
        }

        .categories {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .categories::-webkit-scrollbar {
            height: 5px;
        }

        .categories::-webkit-scrollbar-thumb {
            background-color: var(--light-gray);
            border-radius: 4px;
        }

        .cat-btn {
            padding: 10px 20px;
            background-color: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cat-btn.active, .cat-btn:hover {
            background-color: var(--primary-color);
            color: var(--white);
            border-color: var(--primary-color);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background-color: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background-color: var(--light-gray);
        }

        .product-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 16px;
            color: var(--primary-color);
            font-weight: bold;
            margin-top: auto;
            margin-bottom: 12px;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 10px;
            background-color: var(--white);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .add-to-cart-btn:hover {
            background-color: var(--primary-color);
            color: var(--white);
        }

        .cart-sidebar {
            background-color: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .cart-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--light-gray);
            display: flex;
            justify-content: space-between;
        }

        .cart-items {
            max-height: 240px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .cart-item-detail {
            flex-grow: 1;
            padding-right: 10px;
        }

        .cart-item-name {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .cart-item-price {
            color: var(--gray);
            font-size: 13px;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 1px solid var(--light-gray);
            background-color: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .qty-btn:hover {
            background-color: var(--bg-color);
        }

        .cart-summary {
            border-top: 1px solid var(--light-gray);
            padding-top: 15px;
            margin-bottom: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .summary-row.total {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-color);
            margin-top: 5px;
        }

        .checkout-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkout-form input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--light-gray);
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        .checkout-form input:focus {
            border-color: var(--primary-color);
        }

        .order-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            transition: 0.2s;
        }

        .order-btn:hover {
            background-color: #009640;
        }

        .empty-cart-msg {
            text-align: center;
            color: var(--gray);
            padding: 30px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo"><i class="fa-solid fa-utensils"></i> FoodHub</a>
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="Tìm món ăn bạn thèm hôm nay...">
        </div>
        <div class="cart-icon">
            <i class="fa-solid fa-basket-shopping"></i>
            <span class="cart-count" id="header-cart-count">0</span>
        </div>
    </header>

    <div class="container">
        <main>
            <div class="categories">
                <button class="cat-btn active" onclick="filterCategory('all', this)"><i class="fa-solid fa-border-all"></i> Tất cả</button>
                <button class="cat-btn" onclick="filterCategory('com', this)"><i class="fa-solid fa-bowl-rice"></i> Cơm trưa</button>
                <button class="cat-btn" onclick="filterCategory('bun', this)"><i class="fa-solid fa-bowl-food"></i> Bún & Phở</button>
                <button class="cat-btn" onclick="filterCategory('an-vat', this)"><i class="fa-solid fa-hotdog"></i> Ăn vặt</button>
                <button class="cat-btn" onclick="filterCategory('nuoc', this)"><i class="fa-solid fa-glass-water"></i> Thức uống</button>
            </div>

            <div class="products-grid" id="products-container"></div>
        </main>

        <aside class="cart-sidebar">
            <div class="cart-title">
                <span>Giỏ hàng của bạn</span>
                <span id="cart-item-qty">(0 món)</span>
            </div>
            
            <div class="cart-items" id="cart-items-container"></div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span>Tạm tính</span>
                    <span id="subtotal">0đ</span>
                </div>
                <div class="summary-row">
                    <span>Phí giao hàng</span>
                    <span id="shipping-fee">15.000đ</span>
                </div>
                <div class="summary-row total">
                    <span>Tổng cộng</span>
                    <span id="total-price">0đ</span>
                </div>
            </div>

            <form class="checkout-form" id="checkout-form" onsubmit="handleCheckout(event)">
                <input type="text" id="customer-name" placeholder="Họ và tên" required>
                <input type="tel" id="customer-phone" placeholder="Số điện thoại" required>
                <input type="text" id="customer-address" placeholder="Địa chỉ giao hàng" required>
                <button type="submit" class="order-btn">Đặt hàng ngay</button>
            </form>
        </aside>
    </div>

    <script>
        const products = [
            { id: 1, name: "Cơm Tấm Sườn Bì Chả", price: 45000, category: "com", img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=400&q=80" },
            { id: 2, name: "Cơm Gà Xối Mỡ", price: 42000, category: "com", img: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=400&q=80" },
            { id: 3, name: "Bún Bò Huế Đặc Biệt", price: 55000, category: "bun", img: "https://images.unsplash.com/photo-1569718212165-3a8278d5f624?auto=format&fit=crop&w=400&q=80" },
            { id: 4, name: "Phở Bò Tái Nạm", price: 50000, category: "bun", img: "https://images.unsplash.com/photo-1583864697784-a0efc8379f70?auto=format&fit=crop&w=400&q=80" },
            { id: 5, name: "Bánh Mì Thịt Nướng", price: 25000, category: "an-vat", img: "https://images.unsplash.com/photo-1600271886742-f049cd451bba?auto=format&fit=crop&w=400&q=80" },
            { id: 6, name: "Gà Rán Giòn Rụm", price: 35000, category: "an-vat", img: "https://images.unsplash.com/photo-1562967914-608f82629710?auto=format&fit=crop&w=400&q=80" },
            { id: 7, name: "Trà Sữa Trân Châu Đường Đen", price: 30000, category: "nuoc", img: "https://images.unsplash.com/photo-1541658016709-82535e94bc69?auto=format&fit=crop&w=400&q=80" },
            { id: 8, name: "Cà Phê Sữa Đá Sài Gòn", price: 20000, category: "nuoc", img: "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&w=400&q=80" }
        ];

        let cart = [];
        let currentCategory = 'all';
        let searchQuery = '';

        function formatMoney(amount) {
            return amount.toLocaleString('vi-VN') + 'đ';
        }

        function displayProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            const filtered = products.filter(p => {
                const matchCategory = currentCategory === 'all' || p.category === currentCategory;
                const matchSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCategory && matchSearch;
            });

            if(filtered.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--gray); padding: 40px 0;">Không tìm thấy món ăn phù hợp.</div>`;
                return;
            }

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${p.img}" alt="${p.name}" class="product-img">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${formatMoney(p.price)}</div>
                        <button class="add-to-cart-btn" onclick="addToCart(${p.id})">Thêm vào giỏ</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterCategory(cat, element) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            displayProducts();
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            displayProducts();
        });

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const cartItem = cart.find(item => item.id === productId);

            if (cartItem) {
                cartItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCart();
        }

        function changeQuantity(productId, delta) {
            const cartItem = cart.find(item => item.id === productId);
            if (!cartItem) return;

            cartItem.quantity += delta;
            if (cartItem.quantity <= 0) {
                cart = cart.filter(item => item.id !== productId);
            }
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';

            let totalItems = 0;
            let subtotal = 0;

            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-cart-msg">Giỏ hàng trống.<br>Hãy chọn món ăn bạn yêu thích!</div>';
            } else {
                cart.forEach(item => {
                    totalItems += item.quantity;
                    subtotal += item.price * item.quantity;

                    const div = document.createElement('div');
                    div.className = 'cart-item';
                    div.innerHTML = `
                        <div class="cart-item-detail">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${formatMoney(item.price)}</div>
                        </div>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="changeQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="changeQuantity(${item.id}, 1)">+</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            }

            const shippingFee = cart.length > 0 ? 15000 : 0;
            const total = subtotal + shippingFee;

            document.getElementById('header-cart-count').innerText = totalItems;
            document.getElementById('cart-item-qty').innerText = `(${totalItems} món)`;
            document.getElementById('subtotal').innerText = formatMoney(subtotal);
            document.getElementById('shipping-fee').innerText = formatMoney(shippingFee);
            document.getElementById('total-price').innerText = formatMoney(total);
        }

        function handleCheckout(event) {
            event.preventDefault();
            if (cart.length === 0) {
                alert("Giỏ hàng của bạn đang trống! Hãy chọn ít nhất một món ăn.");
                return;
            }

            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            const address = document.getElementById('customer-address').value;

            alert(`🎉 Đặt hàng thành công!\n\nCảm ơn ${name} (${phone}) đã ủng hộ.\nĐơn hàng sẽ được giao đến: ${address}.\nTổng thanh toán: ${document.getElementById('total-price').innerText}`);
            
            cart = [];
            document.getElementById('checkout-form').reset();
            updateCart();
        }

        displayProducts();
        updateCart();
    </script>
</body>
</html>
